<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>セキマコト公式サイト</title>

<style>

body{
    margin:0;
    background:#fffaf8;
    font-family:"Hiragino Sans","Yu Gothic",sans-serif;
    color:#444;
}

header{

    background:#fff3f3;
    text-align:center;
    padding:40px 20px;

}

header img{

    width:180px;
    max-width:70%;

}

h1{

    margin-top:15px;
    margin-bottom:5px;
    font-size:34px;

}

.subtitle{

    color:#777;

}

.catch{

    margin-top:25px;
    font-size:20px;
    color:#666;

}

main{

    width:92%;
    max-width:900px;
    margin:auto;

}

section{

    margin-top:45px;

}

h2{

    border-left:8px solid #efb0b8;
    padding-left:12px;

}

.profile{

    line-height:2;

}

.books{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;

}

.book{

    background:white;
    border-radius:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    padding:20px;

}

.book img{

    width:100%;
    border-radius:10px;

}

.book h3{

    margin-top:15px;

}

.button{

    display:inline-block;

    margin-top:15px;

    background:#f09ca8;

    color:white;

    padding:10px 20px;

    border-radius:999px;

    text-decoration:none;

}

.button:hover{

    background:#e57d8d;

}

footer{

    margin-top:60px;

    padding:30px;

    text-align:center;

    color:#999;

    font-size:14px;

}

</style>

</head>

<body>

<header>

<img src="kurousa-bust.png">

<h1>セキマコト</h1>

<p class="subtitle">

点描画・イラスト・絵本

</p>

<p class="catch">

点をひとつ。<br>

またひとつ。

</p>

</header>

<main>

<section>

<h2>プロフィール</h2>

<div class="profile">

うさぎや点描画を中心に、

やさしく静かな世界を描いています。

<br><br>

作品を通して、

少しだけ心がやわらぐ時間を

届けられたら嬉しいです。

</div>

</section>

<section>

<h2>作品</h2>

<div class="books">

<div class="book">

<img src="kurousa01-cover.png">

<h3>

いちごほっぺのくろうさ01

</h3>

<p>

いちごほっぺがチャームポイントの

「くろうさ」の作品集です。

</p>

<a class="button"

href="#">

Amazonで見る

</a>

</div>

<div class="book">

<img src="tennoyume01-cover.png">

<h3>

点の夢01

</h3>

<p>

点描という技法で描いた

作品をまとめた画集です。

</p>

<a class="button"

href="#">

Amazonで見る

</a>

</div>

</div>

</section>

<section>

<h2>ダウンロード</h2>

<p>

点描画入門書の特典ページを

準備中です。

</p>

</section>

<section>

<h2>SNS</h2>

<p>

Instagram

<br>

Threads

<br>

Amazon著者ページ

</p>

</section>

<footer>

© Seki Makoto

</footer>
