<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くろうさ図鑑｜セキマコトの小さな美術館</title>
<style>
body{margin:0;font-family:"Hiragino Sans","Yu Gothic",sans-serif;background:#fffaf8;color:#3f3a37;line-height:1.8}
header{text-align:center;padding:48px 20px;background:#fff0f3}
header img{width:130px}
main{max-width:1080px;margin:auto;padding:36px 18px 70px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:18px}
.card{background:#fff;border-radius:18px;padding:14px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.card img{height:130px;max-width:100%;object-fit:contain}
.name{font-size:.9rem;color:#666}
a{color:#7a5f5f}
footer{text-align:center;padding:34px;background:#fff0f3;color:#777}
</style>
</head>
<body>
<header>
<img src="images/characters/kurousa-welcome.png" alt="くろうさ">
<h1>くろうさ図鑑</h1>
<p>小さな美術館の案内係たち</p>
</header>

<main>
<div class="grid">
<div class="card"><img src="images/characters/kurousa-welcome.png"><div class="name">ようこそ</div></div>
<div class="card"><img src="images/characters/kurousa-thanks.png"><div class="name">ありがとう</div></div>
<div class="card"><img src="images/characters/kurousa-mail.png"><div class="name">おたより</div></div>
<div class="card"><img src="images/characters/kurousa-pencil.png"><div class="name">制作</div></div>
<div class="card"><img src="images/characters/kurousa-camera.png"><div class="name">撮影</div></div>
<div class="card"><img src="images/characters/kurousa-star.png"><div class="name">おすすめ</div></div>
<div class="card"><img src="images/characters/kurousa-book-intro.png"><div class="name">本紹介</div></div>
<div class="card"><img src="images/characters/kurousa-dotting.png"><div class="name">点描</div></div>
<div class="card"><img src="images/characters/kurousa-coffee.png"><div class="name">休憩</div></div>
</div>

<p><a href="index.html">← 小さな美術館へ戻る</a></p>
</main>

<footer>© セキマコトの小さな美術館</footer>
</body>
</html>
